version: 2
updates:
  # npm dev + peer dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    # Peer-deps (react, react-native) are intentionally loose; don't bump minimums automatically.
    # react-test-renderer is pinned to React 18 for now — revisit when the repo upgrades to React 19.
    # TypeScript stays on 5.x until the 6.x ecosystem settles.
    ignore:
      - dependency-name: react
      - dependency-name: react-native
      - dependency-name: react-test-renderer
      - dependency-name: "@types/react-test-renderer"
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    groups:
      babel:
        patterns:
          - "@babel/*"
          - babel-*
      testing:
        patterns:
          - "@testing-library/*"
          - jest
          - jest-*
          - "@types/jest"
          - react-test-renderer
          - "@types/react-test-renderer"
      types:
        patterns:
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
