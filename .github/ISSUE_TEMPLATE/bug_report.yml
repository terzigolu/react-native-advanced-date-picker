name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the sections below.
        The more detail you provide, the faster we can fix the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tapping a date inside the modal does nothing on first tap.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, ideally with a code snippet.
      placeholder: |
        1. Render `<AdvancedDatePicker mode="range" visible onDateChange={...} />`
        2. Tap a date cell in April 2026
        3. Nothing visible happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: 0.2.1
    validations:
      required: true

  - type: input
    id: rn-version
    attributes:
      label: React Native / Expo version
      placeholder: RN 0.76.3 (bare) or Expo SDK 51
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, GIFs, stack traces, links to a reproduction repo, etc.
